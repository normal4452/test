<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #4f46e5, #14b8a6);
      color: white;
    }
    .card {
      text-align: center;
      padding: 3rem 2.5rem;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(12px);
    }
    h1 {
      margin: 0 0 1rem;
      font-size: 3rem;
      letter-spacing: 0.05em;
    }
    p {
      margin: 0;
      font-size: 1.1rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Test</h1>
    <p>これはGitHub Pages用のシンプルなテストページです。</p>
  </div>
</body>
</html>
